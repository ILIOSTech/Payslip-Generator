<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Payslip Generator{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="topbar-brand">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="logo" class="topbar-logo">
        <div class="topbar-brand-text">
          <strong>{{ company.name if company else "ILIOS TECHNOLOGY" }}</strong>
          <span>Payslip Generator</span>
        </div>
      </div>
      {% if session.logged_in %}
      <a class="topbar-logout" href="{{ url_for('logout') }}">Log out</a>
      {% endif %}
    </div>
  </div>
  <div class="page">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
