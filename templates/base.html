<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Payslip Generator{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="page">
    {% if session.logged_in %}
    <div class="logout-bar"><a href="{{ url_for('logout') }}">Log out</a></div>
    {% endif %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
