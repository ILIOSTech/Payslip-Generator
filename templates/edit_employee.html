{% extends "base.html" %}
{% block content %}
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="flash-list">
      {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

<section class="card">
  <h2>Edit Employee</h2>
  <form method="post" action="{{ url_for('edit_employee', employee_id=employee.employee_id) }}" class="employee-form">
    <input name="name" value="{{ employee.name }}" placeholder="Full Name" required>
    <input name="designation" value="{{ employee.designation }}" placeholder="Designation" required>
    <input name="employee_id" value="{{ employee.employee_id }}" placeholder="Employee ID" required readonly>
    <select name="employee_type" required>
      <option value="Permanent" {% if employee.employee_type == "Permanent" %}selected{% endif %}>Permanent (26 days)</option>
      <option value="Labour" {% if employee.employee_type == "Labour" %}selected{% endif %}>Labour (30 days)</option>
    </select>
    <input name="date_of_joining" value="{{ employee.date_of_joining }}" placeholder="Date of Joining" required>
    <input name="uan" value="{{ employee.uan }}" placeholder="UAN Number" required>
    <input name="pay_days" value="{{ employee.pay_days }}" type="number" step="0.5" required>
    <input name="basic" value="{{ employee.basic }}" type="number" step="0.01" required>
    <input name="sp_allowance" value="{{ employee.sp_allowance }}" type="number" step="0.01" required>
    <input name="ptax" value="{{ employee.ptax }}" type="number" step="0.01" required>
    <button type="submit">Save Changes</button>
  </form>
  <a class="back-link" href="{{ url_for('index') }}">&larr; Back without saving</a>
</section>
{% endblock %}
